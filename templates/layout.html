<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; object-src 'none'; base-uri 'self'; form-action 'self';" />
  <title>{% block title %}Social PWA{% endblock %}</title>

  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="manifest"   href="/static/manifest.json" />
  <meta name="theme-color" content="#e94560" />
  <link rel="icon" href="/static/icons/icon-192.png" type="image/png" />

  {% block head %}{% endblock %}
</head>
<body>

  <nav class="navbar">
    <a href="/" class="brand">&#9733; SocialPWA</a>
    <div class="nav-links">
      <a href="/">Login</a>
      <a href="/signup.html">Sign Up</a>
      <a href="/feed.html">Feed</a>
      <a href="/messages">Messages</a>
      <button id="install-btn" class="btn btn-sm">&#8627; Install App</button>
    </div>
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer>
    <p>
      &copy; 2025 Social PWA &mdash;
      <a href="https://owasp.org/www-project-top-ten/" target="_blank" rel="noopener">OWASP Top 10</a>
    </p>
  </footer>

  <script src="/static/js/app.js"></script>

</body>
</html>
