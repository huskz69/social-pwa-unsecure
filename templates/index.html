{% extends "layout.html" %}
{% block title %}Login — SocialPWA{% endblock %}

{% block content %}
<div class="card">
  <h1>Welcome back</h1>
  <p class="subtitle">Log in to your SocialPWA account to see the latest posts.</p>

  {% if msg %}
  <div class="msg-box" id="js-msg-box">{{ msg }}</div>
  {% else %}
  <div id="js-msg-box" style="display:none;"></div>
  {% endif %}

  <form action="/" method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
    <div class="form-group">
      <label for="username">Username</label>
      <input
        type="text"
        id="username"
        name="username"
        placeholder="Enter your username"
        required
        autocomplete="username"
      />
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input
        type="password"
        id="password"
        name="password"
        placeholder="Enter your password"
        required
        autocomplete="off"
      />
    </div>
    <button type="submit" class="btn btn-primary">Log In</button>
  </form>

  <a href="/signup.html" class="btn btn-secondary">Don't have an account? Sign Up</a>
</div>
{% endblock %}
